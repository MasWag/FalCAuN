# This is a CI workflow to execute the examples script using kscript. Notice that scripts depending on MATLAB/Simulink are ignored due to the licensing issues.
name: kscript examples

on:
  push:
    paths-ignore:
      - 'README.md'

jobs:
  kscript:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Ensure the installation of Maven (for self-hosted runners)
        run: |
          sudo apt-get update && sudo apt-get install maven -y
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          java-package: jdk
          distribution: 'temurin'
      - name: Install LTSMin
        run: |
          wget https://github.com/Meijuh/ltsmin/releases/download/v3.1.0/ltsmin-v3.1.0-linux.tgz
          tar xvf ltsmin-v3.1.0-linux.tgz
          sudo cp -r v3.1.0/* /usr

      - name: Install Owl
        run: |
          wget https://github.com/owl-toolkit/owl/releases/download/release-21.0/owl-linux-amd64-21.0.zip
          unzip owl-linux-amd64-21.0.zip -d owl
          mvn install:install-file -N \
            -Dfile=./owl/owl-linux-musl-amd64-21.0/jar/owl-21.0.jar \
            -DgroupId=de.tum.in \
            -DartifactId=owl \
            -Dversion=21.0 \
            -Dpackaging=jar \
            -DgeneratePom=true

      - name: Cache local Maven repository
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and install the core and examples projects with Maven
        run: mvn install --also-make --projects core,examples

      - name: Install SDKMAN
        run: curl -s "https://get.sdkman.io?rcupdate=false" | bash

      - name: Install Kotlin 1.9.X and Kscript with SDKMAN
        run: |
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install kotlin 1.9.24
          sdk install kscript
          echo "$HOME/.sdkman/candidates/kotlin/current/bin" >> "$GITHUB_PATH"
          echo "$HOME/.sdkman/candidates/kscript/current/bin" >> "$GITHUB_PATH"

      - name: Install ktlint
        run: |
          mkdir -p "$HOME/.local/bin"
          wget -O "$HOME/.local/bin/ktlint" https://github.com/pinterest/ktlint/releases/download/1.8.0/ktlint
          chmod +x "$HOME/.local/bin/ktlint"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Lint Kotlin scripts
        run: ./example/kotlin/lint.sh

      - name: Run the examples
        run: |
          cd example/kotlin
          kscript ./mealy-nox.main.kts
          kscript ./bouncing_ball.main.kts
