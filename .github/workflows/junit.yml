name: JUnit

on:
  push:
    paths-ignore:
      - 'README.md'

jobs:
  JUnit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Ensure the installation of Maven (for self-hosted runners)
        run: |
          sudo apt-get update && sudo apt-get install maven -y
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          java-package: jdk
          distribution: 'temurin'
      - name: Install LTSMin
        run: |
          wget https://github.com/Meijuh/ltsmin/releases/download/v3.1.0/ltsmin-v3.1.0-linux.tgz
          tar xvf ltsmin-v3.1.0-linux.tgz
          sudo cp -r v3.1.0/* /usr

      - name: Install Owl
        run: |
          wget https://github.com/owl-toolkit/owl/releases/download/release-21.0/owl-linux-amd64-21.0.zip
          unzip owl-linux-amd64-21.0.zip -d owl
          mvn install:install-file -N \
            -Dfile=./owl/owl-linux-musl-amd64-21.0/jar/owl-21.0.jar \
            -DgroupId=de.tum.in \
            -DartifactId=owl \
            -Dversion=21.0 \
            -Dpackaging=jar \
            -DgeneratePom=true


      - name: Cache local Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install jep
        run: |
          pip install --upgrade setuptools wheel
          pip install --no-cache-dir --no-build-isolation jep==4.3.1
          pip show jep

      - name: Build and test core project with Maven
        run: |
          mvn dependency:go-offline --projects core
          mvn install --also-make --projects core --fail-at-end
        env:
          LD_LIBRARY_PATH: ${{ env.LD_LIBRARY_PATH }}:${{ env.Python3_ROOT_DIR }}/lib/python3.13/site-packages/jep
          JEP_JAVA_LIBRARY_PATH: ${{ env.Python3_ROOT_DIR }}/lib/python3.13/site-packages/jep

      - name: Build and test python project with Maven
        run: |
          PYTHONEXECUTABLE="$(python -c 'import sys; print(sys.executable)')" \
            mvn verify --projects python --fail-at-end
        env:
          LD_LIBRARY_PATH: ${{ env.LD_LIBRARY_PATH }}:${{ env.Python3_ROOT_DIR }}/lib/python3.13/site-packages/jep
          JEP_JAVA_LIBRARY_PATH: ${{ env.Python3_ROOT_DIR }}/lib/python3.13/site-packages/jep

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          files: core/target/site/jacoco/jacoco.xml,python/target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
